<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flutter Roadmap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        /* Slightly deeper, neutral dark mode */
        background: radial-gradient(circle at top, #111827, #030712);
        min-height: 100vh;
        color: #f3f4f6;
        padding: 40px 20px;
      }

      .container {
        max-width: 800px;
        margin: auto;
      }

      /* Header with Logo */
      .header-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 35px;
      }

      .header-container img {
        width: 40px;
        height: 40px;
        /* Slight drop shadow to make the logo pop on dark background */
        filter: drop-shadow(0 4px 6px rgba(71, 197, 251, 0.2)); 
      }

      h1 {
        font-size: 32px;
        font-weight: 600;
        /* Flutter Brand Colors */
        background: linear-gradient(135deg, #47C5FB, #0175C2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.5px;
      }

      /* Main Input Area */
      .add-task-container {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        background: #1f2937;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      .add-task-container input {
        flex: 1;
        margin-top: 0;
        background: #111827;
      }

      /* Task Card - New Design with Left Accent Border */
      .task {
        background: #1f2937;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-left: 4px solid #0175C2; /* Flutter Blue accent */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
      }

      .task:hover {
        border-left-color: #47C5FB; /* Brightens on hover */
        border-top-color: rgba(71, 197, 251, 0.2);
        border-right-color: rgba(71, 197, 251, 0.2);
        border-bottom-color: rgba(71, 197, 251, 0.2);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        transform: translateY(-2px);
      }

      /* Header */
      .task-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .task-title {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
        font-size: 18px;
        color: #e5e7eb;
      }

      /* Subtasks */
      .subtasks {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 15px;
      }

      .subtask-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(17, 24, 39, 0.6);
        padding: 10px 15px;
        border-radius: 8px;
        border: 1px solid transparent;
        transition: 0.2s ease;
      }

      .subtask-item:hover {
        background: rgba(17, 24, 39, 0.9);
        border-color: rgba(255, 255, 255, 0.05);
      }

      .subtask-content {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: #d1d5db;
      }

      /* Subtask Input Area */
      .add-subtask-container {
        display: flex;
        gap: 8px;
      }

      /* Inputs */
      input[type="text"] {
        padding: 10px 15px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        outline: none;
        background: #111827;
        color: #f3f4f6;
        font-family: inherit;
        font-size: 14px;
        transition: 0.2s;
        width: 100%;
      }

      input[type="text"]:focus {
        border-color: #47C5FB;
        box-shadow: 0 0 0 3px rgba(71, 197, 251, 0.15);
      }

      /* Buttons */
      button {
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, #47C5FB, #0175C2);
        color: #ffffff;
        box-shadow: 0 2px 4px rgba(1, 117, 194, 0.2);
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #5EE0FF, #02569B);
        box-shadow: 0 4px 6px rgba(1, 117, 194, 0.4);
      }

      .btn-secondary {
        background: #374151;
        color: #f3f4f6;
        padding: 8px 14px;
      }

      .btn-secondary:hover {
        background: #4b5563;
      }

      .delete-btn {
        background: transparent;
        color: #6b7280;
        font-size: 14px;
        padding: 6px 10px;
      }

      .delete-btn:hover {
        color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
      }

      /* Checkbox */
      input[type="checkbox"] {
        cursor: pointer;
        width: 18px;
        height: 18px;
        accent-color: #47C5FB;
      }

      /* Completed State */
      .completed {
        text-decoration: line-through;
        color: #6b7280;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      
      <div class="header-container">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/flutter/flutter-original.svg" alt="Flutter Logo" />
        <h1>Flutter Roadmap</h1>
      </div>
      
      <div class="add-task-container">
        <input type="text" id="newTask" placeholder="Add a new main task..." onkeypress="handleMainTaskKey(event)" />
        <button class="btn-primary" onclick="addTask()">Add Task</button>
      </div>

      <div id="tasks"></div>
    </div>

    <script>
      // Load from localStorage or use default Flutter roadmap data
      let data = JSON.parse(localStorage.getItem("flutter")) || [
        {
          title: "Dart Programming",
          done: false,
          subs: [
            { t: "Variables, Functions, & Data Types", d: false },
            { t: "Object-Oriented Programming (OOP)", d: false },
            { t: "Null Safety", d: false },
            { t: "Asynchronous Programming (Async/Await)", d: false },
          ],
        },
        {
          title: "Flutter Fundamentals",
          done: false,
          subs: [
            { t: "Stateless vs Stateful Widgets", d: false },
            { t: "Layouts (Row, Column, Stack, Container)", d: false },
            { t: "Material & Cupertino UI Components", d: false },
          ],
        },
        {
          title: "Navigation & Routing",
          done: false,
          subs: [
            { t: "Navigator 1.0 (push, pop)", d: false },
            { t: "Named Routes", d: false },
            { t: "GoRouter (Advanced Navigation)", d: false },
          ],
        },
        {
          title: "State Management",
          done: false,
          subs: [
            { t: "setState() & InheritedWidget", d: false },
            { t: "Provider", d: false },
            { t: "Riverpod / BLoC (Pick one advanced)", d: false },
          ],
        },
        {
          title: "APIs & Local Storage",
          done: false,
          subs: [
            { t: "HTTP requests with Dio or http package", d: false },
            { t: "JSON Serialization", d: false },
            { t: "SharedPreferences", d: false },
            { t: "SQLite / Isar / Hive for Databases", d: false },
          ],
        },
        {
          title: "Backend as a Service (BaaS)",
          done: false,
          subs: [
            { t: "Firebase Authentication", d: false },
            { t: "Cloud Firestore / Realtime Database", d: false },
            { t: "Supabase (Alternative)", d: false },
          ],
        },
        {
          title: "Deployment & CI/CD",
          done: false,
          subs: [
            { t: "App Icons & Splash Screens", d: false },
            { t: "Play Store & App Store Guidelines", d: false },
            { t: "Codemagic or Fastlane for automation", d: false },
          ],
        },
      ];

      function save() {
        localStorage.setItem("flutter", JSON.stringify(data));
      }

      function render() {
        const el = document.getElementById("tasks");
        el.innerHTML = "";
        data.forEach((task, i) => {
          let div = document.createElement("div");
          div.className = "task";
          
          // Header
          div.innerHTML = `
            <div class="task-header">
              <div class="task-title">
                <input type='checkbox' ${task.done ? "checked" : ""} onchange='toggle(${i})'>
                <span class="${task.done ? "completed" : ""}">${task.title}</span>
              </div>
              <button class='delete-btn' title="Delete Task" onclick='removeTask(${i})'>✖</button>
            </div>
          `;

          // Subtasks container
          let subDiv = document.createElement("div");
          subDiv.className = "subtasks";
          task.subs.forEach((s, si) => {
            let sub = document.createElement("div");
            sub.className = "subtask-item";
            sub.innerHTML = `
              <div class="subtask-content ${s.d ? "completed" : ""}">
                <input type='checkbox' ${s.d ? "checked" : ""} onchange='toggleSub(${i},${si})'> 
                <span>${s.t}</span>
              </div>
              <button class='delete-btn' title="Delete Subtask" onclick='removeSub(${i},${si})'>✖</button>
            `;
            subDiv.appendChild(sub);
          });

          // Add Subtask Input Area
          let addSubContainer = document.createElement("div");
          addSubContainer.className = "add-subtask-container";
          
          let input = document.createElement("input");
          input.type = "text";
          input.placeholder = "Add a subtask...";
          input.onkeypress = (e) => {
            if (e.key === 'Enter' && input.value.trim() !== '') {
              task.subs.push({ t: input.value.trim(), d: false });
              save();
              render();
            }
          };

          let btn = document.createElement("button");
          btn.className = "btn-secondary";
          btn.innerText = "Add";
          btn.onclick = () => {
            if (input.value.trim() !== '') {
              task.subs.push({ t: input.value.trim(), d: false });
              save();
              render();
            }
          };

          addSubContainer.appendChild(input);
          addSubContainer.appendChild(btn);

          div.appendChild(subDiv);
          div.appendChild(addSubContainer);
          el.appendChild(div);
        });
      }

      function toggle(i) {
        data[i].done = !data[i].done;
        save();
        render();
      }

      function toggleSub(i, si) {
        data[i].subs[si].d = !data[i].subs[si].d;
        save();
        render();
      }

      function addTask() {
        let input = document.getElementById("newTask");
        let val = input.value.trim();
        if (val) {
          data.push({ title: val, done: false, subs: [] });
          input.value = "";
          save();
          render();
        }
      }

      function handleMainTaskKey(e) {
        if (e.key === 'Enter') {
          addTask();
        }
      }

      function removeTask(i) {
        if (confirm("Are you sure you want to delete this entire Flutter task and its subtasks?")) {
          data.splice(i, 1);
          save();
          render();
        }
      }

      function removeSub(i, si) {
        if (confirm("Are you sure you want to delete this subtask?")) {
          data[i].subs.splice(si, 1);
          save();
          render();
        }
      }

      // Initial render
      render();
    </script>
  </body>
</html>
